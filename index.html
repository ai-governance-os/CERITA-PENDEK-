<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cerita Pendek BM - Latihan Bercerita</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Floating bubbles background -->
  <div class="bubbles" id="bubbles"></div>

  <!-- ══════════════════════════════════════
       SCREEN 1: MENU PILIH CERITA
  ══════════════════════════════════════ -->
  <div id="screen-menu" class="screen-in">
    <h1 class="app-title">📖 Cerita Pendek BM</h1>
    <p class="app-sub">Pilih cerita untuk berlatih bercerita ✨</p>
    <div class="progress-banner" id="progress-banner" style="display:none"></div>
    <div class="story-grid" id="story-grid"></div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN 2: BACA CERITA
  ══════════════════════════════════════ -->
  <div id="screen-story">

    <!-- Header -->
    <div class="story-header">
      <button class="btn-back" id="btn-back" title="Kembali">←</button>
      <div class="header-title" id="header-title"></div>
      <div class="header-emoji" id="header-emoji"></div>
    </div>

    <!-- Scene + characters -->
    <div class="char-stage" id="char-stage">
      <div class="scene-bg" id="scene-bg"></div>
      <div class="char-main"      id="char-main"></div>
      <div class="char-secondary" id="char-secondary"></div>
    </div>

    <!-- Story text card -->
    <div class="text-wrap" id="text-wrap">
      <div class="story-text" id="story-text"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>

      <div class="ctrl-row">
        <button class="btn-ctrl btn-play"         id="btn-play">▶ Main</button>
        <button class="btn-ctrl btn-pause hidden" id="btn-pause">⏸ Jeda</button>
        <button class="btn-ctrl btn-stop  hidden" id="btn-stop">⏹ Berhenti</button>
        <button class="btn-ctrl btn-music"        id="btn-music">🎵 Muzik</button>
      </div>

      <div class="speed-row">
        <span>🐢</span>
        <input type="range" id="speed-range" min="0.5" max="1.3" step="0.05" value="0.78">
        <span>🐇</span>
        <span id="speed-label">Perlahan</span>
      </div>

      <div class="voice-select-row">
        <span>🎙</span>
        <select id="voice-select">
          <option value="">Pilih Suara...</option>
        </select>
      </div>
    </div>

  </div><!-- /screen-story -->

  <!-- Scripts — load order matters -->
  <script src="js/data.js"></script>
  <script src="js/syllable.js"></script>
  <script src="js/music.js"></script>
  <script src="js/speech.js"></script>
  <script src="js/effects.js"></script>
  <script src="js/progress.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
